apiVersion: fungi.dev/v1alpha1
kind: ServiceManifest

metadata:
  name: spore-box
  labels:
    app: spore-box
    managedBy: fungi

spec:
  runtime: wasmtime

  expose:
    enabled: true
    serviceId: spore-box
    displayName: Spore Box
    transport:
      kind: tcp
    usage:
      kind: web
      path: /
    catalogId: dev.enbop.spore-box

  source:
    url: https://github.com/enbop/spore-box/releases/download/v0.2.0/spore-box.wasm

  ports:
    - hostPort: 28081
      servicePort: 8081
      protocol: tcp

  mounts:
    - hostPath: ${FUNGI_HOME}/services/spore-box/data
      runtimePath: data

  env: {}

  command: []
  entrypoint: []

  workingDir: null

notes:
  - "This manifest can be deployed directly with fungi service deploy."
  - The Wasmtime runtime automatically creates host mount directories before launch.
  - The current minimal implementation supports a single `.wasm` file URL.
  - "spec.expose is the future-facing discovery/UX metadata layer, separate from the runtime launch config."