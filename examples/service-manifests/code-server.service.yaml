apiVersion: fungi.rs/v1alpha1
kind: Service

metadata:
  name: code-server

spec:
  run:
    docker:
      image: ghcr.io/coder/code-server:4.117.0

  entries:
    http:
      port: 8080
      usage: web
      path: /

  mounts:
    - hostPath: ${USER_HOME}
      runtimePath: /home/coder/project

  env:
    PASSWORD: fungi

  command:
    - --bind-addr
    - 0.0.0.0:8080
    - --auth
    - password
    - /home/coder/project

notes:
  - "Upstream project: https://github.com/coder/code-server"
  - "Container image: ghcr.io/coder/code-server:4.117.0"
  - "Example password: fungi"
