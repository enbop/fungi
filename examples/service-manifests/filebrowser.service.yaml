apiVersion: fungi.dev/v1alpha1
kind: ServiceManifest

metadata:
  name: filebrowser
  labels:
    app: filebrowser
    managedBy: fungi

spec:
  runtime: docker

  expose:
    enabled: true
    serviceId: filebrowser
    displayName: File Browser
    transport:
      kind: tcp
    usage:
      kind: web
      path: /
    iconUrl: https://raw.githubusercontent.com/filebrowser/logo/master/icon.svg
    catalogId: io.filebrowser

  source:
    image: filebrowser/filebrowser:latest

  ports:
    - hostPort: 28080
      servicePort: 80
      protocol: tcp

  mounts:
    - hostPath: ${FUNGI_HOME}/services/filebrowser/data
      runtimePath: /srv

  env:
    FB_NOAUTH: "true"

  command: []
  entrypoint: []

  workingDir: null

notes:
  - This manifest can be deployed directly with `fungi service deploy`.
  - The Docker runtime now pulls the image automatically if it is missing locally.
  - start/inspect/logs/stop/remove now accept just the service name.
  - `spec.expose` describes how the service should appear in discovery and what client UX is recommended.